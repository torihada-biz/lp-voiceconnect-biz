  <h1 class="page-hero-title">CONTACT</h1>
</div>

<section class="contact-section fade-in" style="margin: 0 auto; padding-left: 80px; padding-right: 80px;">
  <p class="contact-lead">
    ご質問・ご相談などお気軽にお問い合わせください。<br>
    下記にお問合せ内容をご記入の上、送信ボタンを押してください。
  </p>
  <form class="contact-form" id="contactForm" novalidate>
    <div class="form-group">
      <label class="form-label" for="name">NAME <span>*</span></label>
      <input class="form-input" id="name" name="name" type="text" placeholder="お名前" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="email">EMAIL <span>*</span></label>
      <input class="form-input" id="email" name="email" type="email" placeholder="メールアドレス" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="message">MESSAGE <span>*</span></label>
      <textarea class="form-textarea" id="message" name="message" placeholder="お問い合わせ内容" required></textarea>
    </div>
    <div class="privacy-check">
      <input type="checkbox" id="privacy" required>
      <label for="privacy">
        プライバシーポリシーに同意する<br>
        <a href="privacy.html">プライバシーポリシーはこちら</a>
      </label>
    </div>
    <button type="submit" class="form-submit">SUBMIT</button>
    <p class="form-status" id="formStatus" aria-live="polite"></p>
  </form>
</section>
